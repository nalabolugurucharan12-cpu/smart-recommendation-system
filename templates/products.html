<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h2>Products</h2>

<div class="products-container">
    <button onclick="interact(101, 'view')">Product 101 (View)</button>
    <button onclick="interact(102, 'cart')">Product 102 (Cart)</button>
    <button onclick="interact(103, 'purchase')">Product 103 (Buy)</button>
</div>

<hr>

<h3>Recommendations</h3>

<div class="btn-group">
    <button onclick="loadRecommendations('/recommend/popular')">Popular</button>
    <button onclick="loadRecommendations('/recommend/trending')">Trending</button>
    <button onclick="loadRecommendations('/recommend/hybrid')">🔥 Hybrid</button>
</div>

<!-- 🔥 NEW GRID -->
<div id="results" class="grid"></div>

<a href="/">Back</a>

<script>
function interact(productId, action) {
    fetch(`/interact/${productId}/${action}`)
        .then(res => res.text())
        .then(data => alert(data));
}

function loadRecommendations(url) {
    fetch(url)
        .then(res => res.json())
        .then(data => {

            let container = document.getElementById("results");
            container.innerHTML = "";

            data.forEach(item => {

                let card = document.createElement("div");
                card.className = "card";

                card.innerHTML = `
                    <p><strong>Product ID:</strong> ${item.product_id}</p>
                    <p><strong>Category:</strong> ${item.category}</p>
                `;

                container.appendChild(card);
            });
        });
}

// Auto load hybrid
window.onload = function() {
    loadRecommendations('/recommend/hybrid');
};
</script>

</body>
</html>
