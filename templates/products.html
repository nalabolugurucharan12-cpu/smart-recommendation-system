<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h2>🛍 Products</h2>

<!-- PRODUCT GRID -->
<div id="product-grid" class="grid"></div>

<hr>

<h2>🎯 Recommendations</h2>

<div class="btn-group">
    <button onclick="loadRecommendations('/recommend/popular')">Popular</button>
    <button onclick="loadRecommendations('/recommend/trending')">Trending</button>
    <button onclick="loadRecommendations('/recommend/hybrid')">🔥 Hybrid</button>
</div>

<!-- RECOMMENDATION GRID -->
<div id="recommend-grid" class="grid"></div>

<a href="/">Back</a>

<script>

// ---------------- LOAD PRODUCTS ----------------
function loadProducts() {
    fetch('/products/list')
        .then(res => res.json())
        .then(data => {

            let container = document.getElementById("product-grid");
            container.innerHTML = "";

            data.forEach(item => {

                let card = document.createElement("div");
                card.className = "card";

                card.innerHTML = `
                    <h4>Product ${item.product_id}</h4>
                    <p>Category: ${item.category}</p>

                    <div class="actions">
                        <button onclick="interact(${item.product_id}, 'view')">View</button>
                        <button onclick="interact(${item.product_id}, 'cart')">Cart</button>
                        <button onclick="interact(${item.product_id}, 'purchase')">Buy</button>
                    </div>
                `;

                container.appendChild(card);
            });
        });
}


// ---------------- LOAD RECOMMENDATIONS ----------------
function loadRecommendations(url) {
    fetch(url)
        .then(res => res.json())
        .then(data => {

            let container = document.getElementById("recommend-grid");
            container.innerHTML = "";

            data.forEach(item => {

                let card = document.createElement("div");
                card.className = "card highlight";

                card.innerHTML = `
                    <h4>Product ${item.product_id}</h4>
                    <p>Category: ${item.category}</p>

                    <div class="actions">
                        <button onclick="interact(${item.product_id}, 'view')">View</button>
                        <button onclick="interact(${item.product_id}, 'cart')">Cart</button>
                        <button onclick="interact(${item.product_id}, 'purchase')">Buy</button>
                    </div>
                `;

                container.appendChild(card);
            });
        });
}


// ---------------- INTERACTION ----------------
function interact(productId, action) {
    fetch(`/interact/${productId}/${action}`)
        .then(res => res.json())
        .then(data => {
            alert(data.message || data.error);

            // reload recommendations after interaction
            loadRecommendations('/recommend/hybrid');
        });
}


// ---------------- AUTO LOAD ----------------
window.onload = function() {
    loadProducts();
    loadRecommendations('/recommend/hybrid');
};

</script>

</body>
</html>
